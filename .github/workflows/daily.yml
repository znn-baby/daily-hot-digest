name: Daily Hot Digest

on:
  schedule:
    # 每天 UTC 01:00 (北京时间 09:00) 自动运行
    - cron: '0 1 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug environment
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: |
          echo "API Key length: ${#SILICONFLOW_API_KEY}"
          echo "API Key set: $([ -n "$SILICONFLOW_API_KEY" ] && echo 'yes' || echo 'no')"
          echo "Testing API connectivity..."
          curl -s -o /dev/null -w "API HTTP Status: %{http_code}\n" https://api.siliconflow.cn/v1/models || echo "API unreachable"

      - name: Run scrapers & generate pages
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python main.py

      - name: Commit data & site changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f site/ data/
          git diff --staged --quiet || git commit -m "auto: daily digest $(date +%Y-%m-%d)"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
